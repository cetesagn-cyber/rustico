services:
  postgres:
    image: postgres:16-alpine
    container_name: rustico_postgres
    restart: always
    environment:
      POSTGRES_DB: rustico_db
      POSTGRES_USER: rustico_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configura POSTGRES_PASSWORD en infrastructure/.env}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustico_admin -d rustico_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rustico_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rustico_admin:${POSTGRES_PASSWORD:?Configura POSTGRES_PASSWORD en infrastructure/.env}@postgres:5432/rustico_db
      JWT_SECRET: ${JWT_SECRET:?Configura JWT_SECRET en infrastructure/.env}
      JWT_EXPIRY: 8h
      REFRESH_TOKEN_EXPIRY: 30d
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8082,http://localhost:8083}
    ports:
      - "3002:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal-administracion:
    build:
      context: ../apps/portal-administracion
      dockerfile: Dockerfile
    container_name: rustico_portal_administracion
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8082:80"

  app-barberos:
    build:
      context: ../apps/app-barberos
      dockerfile: Dockerfile
    container_name: rustico_app_barberos
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8083:80"

volumes:
  postgres_data:
