services:
  mysql:
    image: mysql:8.4
    container_name: rustico_mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: rustico_prueba
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rustico_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: rustico_prueba
      JWT_SECRET: rustico-jwt-secret-change-in-production-min-32chars
      JWT_EXPIRY: 8h
      REFRESH_TOKEN_EXPIRY: 30d
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:8082,http://localhost:8083
    ports:
      - "3002:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal-administracion:
    build:
      context: ../apps/portal-administracion
      dockerfile: Dockerfile
    container_name: rustico_portal_administracion
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8082:80"

  app-barberos:
    build:
      context: ../apps/app-barberos
      dockerfile: Dockerfile
    container_name: rustico_app_barberos
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8083:80"

volumes:
  mysql_data:
